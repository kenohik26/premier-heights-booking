                                                                return (
                                                                    <div
                                                                        key={apt}
                                                                        onClick={() => setSelectedApartmentExpense(selectedApartmentExpense === apt ? null : apt)}
                                                                        style={{
                                                                            padding: '0.75rem',
                                                                            borderRadius: '0.5rem',
                                                                            border: `2px solid ${selectedApartmentExpense === apt ? color : '#e5e7eb'}`,
                                                                            cursor: 'pointer',
                                                                            background: selectedApartmentExpense === apt ? `${color}10` : 'white',
                                                                            transition: 'all 0.2s'
                                                                        }}
                                                                        onMouseEnter={e => e.currentTarget.style.borderColor = color}
                                                                        onMouseLeave={e => e.currentTarget.style.borderColor = selectedApartmentExpense === apt ? color : '#e5e7eb'}
                                                                    >
                                                                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.4rem', fontSize: '0.875rem' }}>
                                                                            <span style={{ fontWeight: '700' }}>🏠 {apt}</span>
                                                                            <div style={{ display: 'flex', gap: '0.75rem', alignItems: 'center' }}>
                                                                                <span style={{ fontSize: '0.75rem', color: '#6b7280' }}>{aptExpenses.length} expenses</span>
                                                                                <span style={{ fontWeight: '700', color: '#ef4444' }}>₦{total.toLocaleString()}</span>
                                                                            </div>
                                                                        </div>
                                                                        <div style={{ height: 10, background: '#f3f4f6', borderRadius: 999, overflow: 'hidden' }}>
                                                                            <div style={{ height: '100%', width: `${pct}%`, background: color, borderRadius: 999 }} />
                                                                        </div>
                                                                        <p style={{ fontSize: '0.7rem', color: '#9ca3af', marginTop: '0.2rem' }}>{pct.toFixed(1)}% of total</p>

                                                                        {/* Expanded Detail */}
                                                                        {selectedApartmentExpense === apt && (
                                                                            <div style={{ marginTop: '1rem', paddingTop: '1rem', borderTop: `1px solid ${color}40` }}>
                                                                                <p style={{ fontSize: '0.8rem', fontWeight: '700', color: '#1f2937', marginBottom: '0.75rem' }}>
                                                                                    All Expenses — {apt}
                                                                                </p>
                                                                                {/* Category summary for this apt */}
                                                                                {(() => {
                                                                                    const aptCats = {};
                                                                                    aptExpenses.forEach(e => {
                                                                                        if (!aptCats[e.expenseType]) aptCats[e.expenseType] = 0;
                                                                                        aptCats[e.expenseType] += (e.amount || 0);
                                                                                    });
                                                                                    return (
                                                                                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.4rem', marginBottom: '0.75rem' }}>
                                                                                            {Object.entries(aptCats).sort((a,b) => b[1]-a[1]).map(([type, amt]) => (
                                                                                                <span key={type} style={{
                                                                                                    padding: '0.2rem 0.6rem',
                                                                                                    background: categoryConfig[type]?.color + '20',
                                                                                                    border: `1px solid ${categoryConfig[type]?.color}`,
                                                                                                    borderRadius: '999px',
                                                                                                    fontSize: '0.75rem',
                                                                                                    fontWeight: '600',
                                                                                                    color: categoryConfig[type]?.color
                                                                                                }}>
                                                                                                    {categoryConfig[type]?.emoji} {categoryConfig[type]?.label}: ₦{amt.toLocaleString()}
                                                                                                </span>
                                                                                            ))}
                                                                                        </div>
                                                                                    );
                                                                                })()}
                                                                                {/* Individual expenses */}
                                                                                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.4rem', maxHeight: '200px', overflowY: 'auto' }}>
                                                                                    {aptExpenses.sort((a, b) => new Date(b.date) - new Date(a.date)).map(e => (
                                                                                        <div key={e.id} style={{
                                                                                            display: 'flex',
                                                                                            justifyContent: 'space-between',
                                                                                            alignItems: 'center',
                                                                                            padding: '0.4rem 0.5rem',
                                                                                            background: '#f9fafb',
                                                                                            borderRadius: '0.375rem',
                                                                                            fontSize: '0.8rem'
                                                                                        }}>
                                                                                            <div>
                                                                                                <span style={{ fontWeight: '600' }}>{categoryConfig[e.expenseType]?.emoji} {e.description}</span>
                                                                                                <span style={{ color: '#9ca3af', marginLeft: '0.5rem' }}>{new Date(e.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</span>
                                                                                            </div>
                                                                                            <span style={{ fontWeight: '700', color: '#ef4444' }}>₦{(e.amount || 0).toLocaleString()}</span>
                                                                                        </div>
                                                                                    ))}
                                                                                </div>
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                );
                                                            })}
                                                    </div>
                                                </div>

                                                {/* Category Breakdown Table */}
                                                <div className="card">
                                                    <h3 style={{ fontSize: '1.1rem', fontWeight: '700', marginBottom: '1.25rem', color: '#1f2937' }}>
                                                        📋 Category Breakdown
                                                    </h3>
                                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '0.6rem' }}>
                                                        {categoryTotals.map((cat, i) => (
                                                            <div key={cat.type} style={{
                                                                display: 'flex',
                                                                alignItems: 'center',
                                                                gap: '0.75rem',
                                                                padding: '0.6rem 0.75rem',
                                                                background: i === 0 ? '#fef9f0' : '#f9fafb',
                                                                borderRadius: '0.5rem',
                                                                borderLeft: `4px solid ${cat.color}`
                                                            }}>
                                                                <span style={{ fontSize: '1.25rem' }}>{cat.emoji}</span>
                                                                <div style={{ flex: 1 }}>
                                                                    <p style={{ fontSize: '0.875rem', fontWeight: '600' }}>
                                                                        {cat.label}
                                                                        {i === 0 && <span style={{ marginLeft: '0.5rem', fontSize: '0.7rem', background: '#F15A29', color: 'white', padding: '0.1rem 0.4rem', borderRadius: '999px' }}>Highest</span>}
                                                                    </p>
                                                                    <p style={{ fontSize: '0.75rem', color: '#6b7280' }}>
                                                                        {expenses.filter(e => e.expenseType === cat.type).length} transactions
                                                                    </p>
                                                                </div>
                                                                <span style={{ fontWeight: '700', color: '#ef4444', fontSize: '0.9rem' }}>
                                                                    ₦{cat.total.toLocaleString()}
                                                                </span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </>
                                    );
                                })()}

                                {/* Month History Modal */}
                                {showLastMonthModal && selectedExpenseMonth && (() => {
                                    const [selYear, selMonth] = selectedExpenseMonth.split('-').map(Number);
                                    const monthDate = new Date(selYear, selMonth - 1, 1);
                                    const monthLabel = monthDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

                                    const monthExpenses = expenses.filter(e => {
                                        const d = new Date(e.date);
                                        return d.getMonth() === selMonth - 1 && d.getFullYear() === selYear;
                                    }).sort((a, b) => new Date(b.date) - new Date(a.date));

                                    const monthTotal = monthExpenses.reduce((s, e) => s + (e.amount || 0), 0);

                                    const categoryConfig = {
                                        electricity: { label: 'Electricity', emoji: '⚡', color: '#f59e0b' },
                                        water:       { label: 'Water',       emoji: '💧', color: '#3b82f6' },
                                        diesel:      { label: 'Diesel',      emoji: '⛽', color: '#6b7280' },
                                        maintenance: { label: 'Maintenance', emoji: '🔧', color: '#8b5cf6' },
                                        cleaning:    { label: 'Cleaning',    emoji: '🧹', color: '#10b981' },
                                        repairs:     { label: 'Repairs',     emoji: '🛠️', color: '#ef4444' },
                                        supplies:    { label: 'Supplies',    emoji: '📦', color: '#F15A29' },
                                        other:       { label: 'Other',       emoji: '📋', color: '#2E3192' },
                                    };

                                    const byCategory = {};
                                    monthExpenses.forEach(e => {
                                        if (!byCategory[e.expenseType]) byCategory[e.expenseType] = 0;
                                        byCategory[e.expenseType] += (e.amount || 0);
                                    });

                                    // Excel export function
                                    const exportToExcel = () => {
                                        const rows = [
                                            ['Premier Heights — Expense Report'],
                                            [`Month: ${monthLabel}`],
                                            [`Exported: ${new Date().toLocaleDateString()}`],
                                            [],
                                            ['Date', 'Apartment', 'Category', 'Description', 'Amount (₦)', 'Notes'],
                                            ...monthExpenses.map(e => {
                                                const apt = e.apartmentId === 'general' ? 'General' : apartments.find(a => a.id === e.apartmentId)?.name || 'Unknown';
                                                const cat = categoryConfig[e.expenseType]?.label || e.expenseType;
                                                return [
                                                    new Date(e.date).toLocaleDateString('en-GB'),
                                                    apt,
                                                    cat,
                                                    e.description,
                                                    e.amount || 0,
                                                    e.notes || ''
                                                ];
                                            }),
                                            [],
                                            ['', '', '', 'TOTAL', monthTotal, ''],
                                            [],
                                            ['CATEGORY SUMMARY'],
                                            ['Category', 'Amount (₦)', '% of Total'],
                                            ...Object.entries(byCategory).sort((a,b) => b[1]-a[1]).map(([type, amt]) => [
                                                categoryConfig[type]?.label || type,
                                                amt,
                                                `${(amt / monthTotal * 100).toFixed(1)}%`
                                            ])
                                        ];

                                        // Convert to CSV
                                        const csv = rows.map(row =>
                                            row.map(cell => {
                                                const val = String(cell ?? '');
                                                return val.includes(',') || val.includes('"') || val.includes('\n')
                                                    ? `"${val.replace(/"/g, '""')}"`
                                                    : val;
                                            }).join(',')
                                        ).join('\n');

                                        const BOM = '\uFEFF';
                                        const blob = new Blob([BOM + csv], { type: 'text/csv;charset=utf-8;' });
                                        const url = URL.createObjectURL(blob);
                                        const link = document.createElement('a');
                                        link.href = url;
                                        link.download = `PremierHeights_Expenses_${monthLabel.replace(' ', '_')}.csv`;
                                        link.click();
                                        URL.revokeObjectURL(url);
                                    };

                                    return (
                                        <div className="modal-overlay" onClick={() => { setShowLastMonthModal(false); setSelectedExpenseMonth(''); }}>
                                            <div className="modal-content" onClick={e => e.stopPropagation()} style={{ maxWidth: '750px', maxHeight: '90vh', overflow: 'auto' }}>
                                                <div className="modal-header">
                                                    <div>
                                                        <h3>📅 {monthLabel} — Expense Report</h3>
                                                        <p style={{ fontSize: '0.875rem', color: '#6b7280', marginTop: '0.25rem' }}>
                                                            {monthExpenses.length} transactions · Total: <strong style={{ color: '#ef4444' }}>₦{monthTotal.toLocaleString()}</strong>
                                                        </p>
                                                    </div>
                                                    <div style={{ display: 'flex', gap: '0.75rem', alignItems: 'center' }}>
                                                        <button
                                                            onClick={exportToExcel}
                                                            style={{
                                                                padding: '0.5rem 1rem',
                                                                background: 'linear-gradient(135deg, #10b981 0%, #059669 100%)',
                                                                color: 'white',
                                                                border: 'none',
                                                                borderRadius: '0.5rem',
                                                                cursor: 'pointer',
                                                                fontWeight: '700',
                                                                fontSize: '0.875rem',
                                                                display: 'flex',
                                                                alignItems: 'center',
                                                                gap: '0.4rem'
                                                            }}
                                                        >
                                                            📊 Export to Excel
                                                        </button>
                                                        <button className="modal-close" onClick={() => { setShowLastMonthModal(false); setSelectedExpenseMonth(''); }}>×</button>
                                                    </div>
                                                </div>

                                                <div style={{ padding: '1.5rem' }}>
                                                    {monthExpenses.length === 0 ? (
                                                        <p style={{ textAlign: 'center', color: '#9ca3af', padding: '2rem' }}>No expenses recorded for this month.</p>
                                                    ) : (
                                                        <>
                                                            {/* Category Summary */}
                                                            <h4 style={{ fontSize: '0.95rem', fontWeight: '700', marginBottom: '0.75rem', color: '#1f2937' }}>Category Breakdown</h4>
                                                            <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem', marginBottom: '1.5rem' }}>
                                                                {Object.entries(byCategory).sort((a, b) => b[1] - a[1]).map(([type, amt]) => {
                                                                    const cat = categoryConfig[type] || { label: type, emoji: '📋', color: '#6b7280' };
                                                                    const pct = (amt / monthTotal * 100).toFixed(1);
                                                                    return (
                                                                        <div key={type} style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', padding: '0.6rem 0.75rem', background: '#f9fafb', borderRadius: '0.5rem', borderLeft: `4px solid ${cat.color}` }}>
                                                                            <span style={{ fontSize: '1.1rem' }}>{cat.emoji}</span>
                                                                            <span style={{ flex: 1, fontWeight: '600', fontSize: '0.875rem' }}>{cat.label}</span>
                                                                            <div style={{ width: 80, height: 8, background: '#e5e7eb', borderRadius: 999, overflow: 'hidden' }}>
                                                                                <div style={{ height: '100%', width: `${pct}%`, background: cat.color, borderRadius: 999 }} />
                                                                            </div>
                                                                            <span style={{ fontSize: '0.8rem', color: '#6b7280', width: 40, textAlign: 'right' }}>{pct}%</span>
                                                                            <span style={{ fontWeight: '700', color: '#ef4444', width: 90, textAlign: 'right' }}>₦{amt.toLocaleString()}</span>
                                                                        </div>
                                                                    );
                                                                })}
                                                                <div style={{ display: 'flex', justifyContent: 'flex-end', padding: '0.5rem 0.75rem', fontWeight: '800', fontSize: '1rem', color: '#1f2937' }}>
                                                                    Total: <span style={{ color: '#ef4444', marginLeft: '0.5rem' }}>₦{monthTotal.toLocaleString()}</span>
                                                                </div>
                                                            </div>

                                                            {/* Transaction List */}
                                                            <h4 style={{ fontSize: '0.95rem', fontWeight: '700', marginBottom: '0.75rem', color: '#1f2937' }}>All Transactions ({monthExpenses.length})</h4>
                                                            <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                                                                {monthExpenses.map(e => {
                                                                    const cat = categoryConfig[e.expenseType] || { emoji: '📋', color: '#6b7280', label: e.expenseType };
                                                                    const apt = e.apartmentId === 'general' ? 'General' : apartments.find(a => a.id === e.apartmentId)?.name || 'Unknown';
                                                                    return (
                                                                        <div key={e.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.65rem 0.75rem', background: '#f9fafb', borderRadius: '0.5rem', borderLeft: `3px solid ${cat.color}` }}>
                                                                            <div style={{ flex: 1 }}>
                                                                                <span style={{ fontWeight: '600', fontSize: '0.875rem' }}>{cat.emoji} {e.description}</span>
                                                                                <span style={{ color: '#9ca3af', marginLeft: '0.5rem', fontSize: '0.8rem' }}>
                                                                                    {apt} · {new Date(e.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}
                                                                                </span>
                                                                                {e.notes && <p style={{ fontSize: '0.75rem', color: '#6b7280', marginTop: '0.1rem', fontStyle: 'italic' }}>{e.notes}</p>}
                                                                            </div>
                                                                            <span style={{ fontWeight: '700', color: '#ef4444', marginLeft: '1rem' }}>₦{(e.amount || 0).toLocaleString()}</span>
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        </>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })()}

                                {/* This Month Expenses List */}
                                <div className="card">
                                    <h3 style={{ fontSize: '1.25rem', fontWeight: '700', marginBottom: '1.5rem' }}>
                                        📅 This Month's Expenses ({expenses.filter(e => {
                                            const d = new Date(e.date);
                                            const now = new Date();
                                            return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                                        }).length})
                                    </h3>

                                    {expenses.filter(e => {
                                        const d = new Date(e.date);
                                        const now = new Date();
                                        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                                    }).length === 0 ? (
                                        <p style={{ textAlign: 'center', color: '#9ca3af', padding: '3rem' }}>
                                            No expenses recorded this month yet.
                                        </p>
                                    ) : (
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                            {expenses
                                                .filter(e => {
                                                    const d = new Date(e.date);
                                                    const now = new Date();
                                                    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                                                })
                                                .sort((a, b) => new Date(b.date) - new Date(a.date))
                                                .map(expense => {
                                                    const apartment = expense.apartmentId === 'general'
                                                        ? { name: 'General' }
                                                        : apartments.find(a => a.id === expense.apartmentId);
                                                    
                                                    return (
                                                        <div key={expense.id} className="booking-card">
                                                            <div className="booking-card-header">
                                                                <div>
                                                                    <h4 style={{ fontSize: '1.125rem', fontWeight: '600', color: '#1f2937', marginBottom: '0.25rem' }}>
                                                                        {expense.description}
                                                                    </h4>
                                                                    <p style={{ fontSize: '0.875rem', color: '#6b7280' }}>
                                                                        {apartment?.name || 'Unknown'} {expense.apartmentId !== 'general' ? 'Apartment' : ''} • {new Date(expense.date).toLocaleDateString()}
                                                                    </p>
                                                                </div>
                                                                <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}>
                                                                    <span style={{ 
                                                                        padding: '0.5rem 1rem',
                                                                        background: 'linear-gradient(135deg, #2E3192 0%, #F15A29 100%)',
                                                                        color: 'white',
                                                                        borderRadius: '0.5rem',
                                                                        fontWeight: '700',
                                                                        fontSize: '1.125rem'
                                                                    }}>
                                                                        ₦{expense.amount.toLocaleString()}
                                                                    </span>
                                                                    <button
                                                                        onClick={() => handleEditExpense(expense)}
                                                                        className="icon-btn icon-btn-blue"
                                                                        title="Edit"
                                                                    >
                                                                        <Edit />
                                                                    </button>
                                                                    <button
                                                                        onClick={() => handleDeleteExpense(expense.id)}
                                                                        className="icon-btn icon-btn-red"
                                                                        title="Delete"
                                                                    >
                                                                        <Trash />
                                                                    </button>
                                                                </div>
                                                            </div>

                                                            <div className="booking-details-grid">
                                                                <div className="detail-item">
                                                                    <p className="detail-label">Type</p>
                                                                    <p className="detail-value" style={{ textTransform: 'capitalize' }}>
                                                                        {expense.expenseType}
                                                                    </p>
                                                                </div>
                                                                {expense.notes && (
                                                                    <div className="detail-item" style={{ gridColumn: '1 / -1' }}>
                                                                        <p className="detail-label">Notes</p>
                                                                        <p className="detail-value">{expense.notes}</p>
                                                                    </div>
                                                                )}
                                                                <div className="detail-item">
                                                                    <p className="detail-label">Recorded By</p>
                                                                    <p className="detail-value">{expense.createdBy}</p>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<BookingManager />, document.getElementById('root'));
    </script>
</body>
</html>
