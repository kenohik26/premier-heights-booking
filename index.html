<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier Heights Booking Manager - Enhanced Edition</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <!-- Chart.js for Reports -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- SheetJS for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    
    <!-- EmailJS for Email Notifications -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        /* Premier Heights Brand Styles */
        :root {
            --brand-royal-blue: #2E3192;
            --brand-burnt-orange: #F15A29;
            --brand-light-orange: #F7941D;
            --brand-gray: #D1D3D4;
            --brand-black: #000000;
            --brand-white: #FFFFFF;
        }

        h1, h2, h3, h4, h5, h6, .section-title, .stat-value, .login-title {
            font-family: 'Museo', 'Raleway', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 700;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* Login Page Styles */
        .login-wrapper {
            min-height: 100vh;
            background: linear-gradient(to bottom right, #eff6ff, #e0e7ff);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-card {
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            width: 100%;
            max-width: 28rem;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-icon {
            width: 4rem;
            height: 4rem;
            color: #2E3192;
            margin: 0 auto 1rem;
        }

        .login-title {
            font-size: 1.875rem;
            font-weight: 700;
            color: #1f2937;
        }

        .login-subtitle {
            color: #6b7280;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.25rem;
        }

        .form-input {
            width: 100%;
            padding: 0.5rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 1rem;
        }

        .form-input:focus {
            outline: none;
            border-color: #2E3192;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .form-input:disabled {
            background-color: #f3f4f6;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #2E3192 0%, #F15A29 100%);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #5568d3 0%, #653a8b 100%);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #e95f89 0%, #edd02f 100%);
        }

        .btn-danger {
            color: white;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            padding: 0.5rem;
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #ff5252 0%, #dd495e 100%);
        }

        .btn-edit {
            color: white;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 0.5rem;
        }

        .btn-edit:hover {
            background: linear-gradient(135deg, #3e9bed 0%, #00e1ed 100%);
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white;
            padding: 0.5rem 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp:hover {
            background: linear-gradient(135deg, #20BA5A 0%, #0F7A6B 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4);
        }

        .btn-whatsapp svg {
            width: 18px;
            height: 18px;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .info-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #f9fafb;
            border-radius: 0.5rem;
            font-size: 0.875rem;
        }

        .info-box p {
            margin-bottom: 0.5rem;
            color: #6b7280;
        }

        .info-box p:last-child {
            margin-bottom: 0;
        }

        .info-title {
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
        }

        /* Main App Styles */
        .app-wrapper {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .header {
            background-color: white;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid #e5e7eb;
        }

        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header-icon {
            width: 2rem;
            height: 2rem;
            color: #2E3192;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
        }

        .header-subtitle {
            font-size: 0.875rem;
            color: #6b7280;
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            color: #374151;
            background: transparent;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .logout-btn:hover {
            background-color: #f3f4f6;
        }

        /* Navigation */
        .nav {
            background-color: white;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid #e5e7eb;
        }

        .nav-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            gap: 2rem;
        }

        .nav-btn {
            padding: 1rem 0.5rem;
            border: none;
            background: transparent;
            border-bottom: 2px solid transparent;
            font-weight: 500;
            cursor: pointer;
            color: #6b7280;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            color: #1f2937;
        }

        .nav-btn.active {
            border-bottom-color: #2E3192;
            color: #2E3192;
        }

        /* Main Content */
        .main-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #2E3192 0%, #F15A29 100%);
        }

        .stat-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal-content {
            background: white;
            border-radius: 1rem;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #2E3192 0%, #F15A29 100%);
            color: white;
            border-radius: 1rem 1rem 0 0;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-section {
            margin-bottom: 1.5rem;
        }

        .modal-section-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1rem;
        }

        .apartment-detail-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 20%);
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
        }

        .booking-list-item {
            padding: 1rem;
            background: #f9fafb;
            border-radius: 0.5rem;
            margin-bottom: 0.75rem;
            border-left: 4px solid #2E3192;
            transition: all 0.2s;
        }

        .booking-list-item:hover {
            background: #f3f4f6;
            transform: translateX(4px);
        }

        .stat-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-label {
            font-size: 0.875rem;
            color: #6b7280;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 2.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2E3192 0%, #F15A29 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-value-green {
            font-size: 2.25rem;
            font-weight: 800;
            color: #10b981 !important;
        }

        .stat-icon {
            width: 3.5rem;
            height: 3.5rem;
            opacity: 0.15;
        }

        .stat-icon-indigo { color: #2E3192; }
        .stat-icon-green { color: #10b981; }
        .stat-icon-yellow { color: #f59e0b; }
        .stat-icon-blue { color: #4facfe; }

        /* Apartment Cards */
        .apartments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .apartment-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: none;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .apartment-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        .apartment-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .apartment-name {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2E3192 0%, #F15A29 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .apartment-bedrooms {
            font-size: 0.875rem;
            color: #6b7280;
            font-weight: 500;
        }

        .apartment-icon {
            width: 2.5rem;
            height: 2.5rem;
            padding: 0.5rem;
            background: linear-gradient(135deg, #2E3192 0%, #F15A29 100%);
            color: white;
            border-radius: 0.75rem;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .apartment-price {
            margin-bottom: 1rem;
        }

        .price-label {
            font-size: 0.75rem;
            color: #6b7280;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .price-value {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .booking-info {
            padding: 1rem;
            border-radius: 0.75rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .booking-info-blue {
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
        }

        .booking-info-green {
            background: linear-gradient(135deg, #d1fae5 0%, #ecfdf5 100%);
        }
            background-color: #f0fdf4;
        }

        .booking-info-label {
            font-size: 0.75rem;
            color: #6b7280;
            margin-bottom: 0.25rem;
        }

        .booking-info-guest {
            font-size: 0.875rem;
            font-weight: 500;
            color: #1f2937;
        }

        .booking-info-dates {
            font-size: 0.75rem;
            color: #6b7280;
        }

        .available-text {
            font-size: 0.875rem;
            font-weight: 500;
            color: #059669;
        }

        .available-subtext {
            font-size: 0.75rem;
            color: #10b981;
        }

        .more-bookings {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 0.5rem;
        }

        /* Status Badges */
        .status-badge {
            display: inline-block;
            padding: 0.375rem 1rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            border: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-pending {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: white;
        }

        .status-confirmed {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: white;
        }

        .status-checked-in {
            background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
            color: white;
        }

        .status-completed {
            background: linear-gradient(135deg, #9ca3af 0%, #6b7280 100%);
            color: white;
        }

        .status-cancelled {
            background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
            color: white;
        }

        /* Form Card */
        .form-card {
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .form-section {
            margin-bottom: 1.5rem;
        }

        .calculation-box {
            background-color: #eef2ff;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .calculation-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .calculation-item p:first-child {
            font-size: 0.875rem;
            color: #6b7280;
        }

        .calculation-value {
            font-size: 1.125rem;
            font-weight: 600;
            margin-top: 0.25rem;
        }

        .calc-gray { color: #1f2937; }
        .calc-indigo { color: #2E3192; }
        .calc-red { color: #ef4444; font-weight: 700; } /* Negative: debts, deductions, amounts owed */
        .calc-green { color: #10b981; font-weight: 700; } /* Positive: payments received, refunds given */
        .calc-indigo { color: #2E3192; font-weight: 700; } /* Neutral: total amounts, base prices */

        .form-buttons {
            display: flex;
            gap: 1rem;
        }

        .form-buttons .btn {
            flex: 1;
        }

        .form-input-full {
            width: 100%;
        }

        /* Filter Section */
        .filter-card {
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 1rem;
        }

        .search-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            width: 1.25rem;
            height: 1.25rem;
        }

        .search-input {
            width: 100%;
            padding: 0.5rem 1rem 0.5rem 2.5rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
        }

        .search-input:focus {
            outline: none;
            border-color: #2E3192;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        /* Booking List */
        .bookings-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .booking-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            border: none;
            padding: 1.75rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .booking-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, #2E3192 0%, #F15A29 100%);
        }

        .booking-card:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            transform: translateX(4px);
        }

        .booking-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .booking-header-left {
            flex: 1;
        }

        .booking-name-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .booking-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1f2937;
        }

        .booking-apartment {
            font-size: 0.875rem;
            color: #6b7280;
            font-weight: 500;
        }

        .booking-actions {
            display: flex;

                            try {
                                // Auto check-in: If today is check-in date and time is past 2 PM (14:00)

            // Calendar helper functions
            const getDaysInMonth = (date) => {
                const year = date.getFullYear();
                const month = date.getMonth();
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const daysInMonth = lastDay.getDate();
                const startingDayOfWeek = firstDay.getDay();
                
                const days = [];
                
                // Add empty slots for days before month starts
                for (let i = 0; i < startingDayOfWeek; i++) {
                    const prevMonthDay = new Date(year, month, -startingDayOfWeek + i + 1);
                    const dayOfWeek = prevMonthDay.getDay();
                    days.push({ 
                        date: prevMonthDay, 
                        isCurrentMonth: false,
                        isWeekend: dayOfWeek === 0 || dayOfWeek === 6
                    });
                }
                
                // Add days of current month
                for (let day = 1; day <= daysInMonth; day++) {
                    const currentDate = new Date(year, month, day);
                    const dayOfWeek = currentDate.getDay();
                    days.push({ 
                        date: currentDate, 
                        isCurrentMonth: true,
                        isWeekend: dayOfWeek === 0 || dayOfWeek === 6
                    });
                }
                
                // Add days to complete the week
                const remainingDays = 7 - (days.length % 7);
                if (remainingDays < 7) {
                    for (let i = 1; i <= remainingDays; i++) {
                        const nextMonthDay = new Date(year, month + 1, i);
                        const dayOfWeek = nextMonthDay.getDay();
                        days.push({ 
                            date: nextMonthDay, 
                            isCurrentMonth: false,
                            isWeekend: dayOfWeek === 0 || dayOfWeek === 6
                        });
                    }
                }
                
                return days;
            };

            const getWeekDays = (date) => {

                const startOfWeek = new Date(date);
                startOfWeek.setDate(date.getDate() - date.getDay()); // Start from Sunday
                
                for (let i = 0; i < 7; i++) {
                    const day = new Date(startOfWeek);
                    day.setDate(startOfWeek.getDate() + i);
                    const dayOfWeek = day.getDay();
                    days.push({
                        date: day,
                        isCurrentMonth: day.getMonth() === date.getMonth(),
                        isWeekend: dayOfWeek === 0 || dayOfWeek === 6
                    });
                }
                
                return days;

                                        const d = new Date(startDate);

                                        // Check-out ends at 12PM (halfway through the day = 0.5)
                                        checkIn.setHours(14, 0, 0, 0); // 2PM check-in
                                        checkOut.setHours(12, 0, 0, 0); // 12PM check-out

                                        const rangeStart = new Date(startDate);
                                        rangeStart.setHours(0, 0, 0, 0);
                                        const rangeEnd = new Date(endDate);
                                        rangeEnd.setHours(23, 59, 59, 0);

                                        // Check if booking overlaps with visible range
                                        if (checkOut < rangeStart || checkIn > rangeEnd) return null;

                                        const visibleStart = checkIn < rangeStart ? rangeStart : checkIn;
                                        const visibleEnd = checkOut > rangeEnd ? rangeEnd : checkOut;

                                        const totalMs = timelineRange * 24 * 60 * 60 * 1000;
                                        const leftMs = visibleStart - rangeStart;
                                        const widthMs = visibleEnd - visibleStart;

                                        const left = (leftMs / totalMs) * 100;
                                        const width = (widthMs / totalMs) * 100;

                                        return { left: `${Math.max(0, left)}%`, width: `${Math.max(0.5, width)}%` };
                                    };

                                    };

                                        setCalendarDate(d);

                                                            <div style={{ fontSize: '0.9rem', fontWeight: '800' }}>

                                                const aptBookings = bookings.filter(b =>

                                                return (
                                                    <div key={apartment.id} className="timeline-apt-row">
                                                        {/* Apartment Label */}
                                                        <div
                                                            className="timeline-apt-label"
                                                            style={{ background: color }}

                                                            {apartment.name}

                                                        {/* Booking Track */}
                                                        <div className="timeline-apt-track">
                                                            {/* Today line */}
                                                            {todayPos && (
                                                                <div
                                                                    className="timeline-today-line"
                                                                    style={{ left: todayPos }}

                                                                const isWeekend = day.getDay() === 0 || day.getDay() === 6;

                                                        return e.expenseType === 'electricity' &&
                                                               expenseDate.getMonth() === now.getMonth() && 
                                                               expenseDate.getFullYear() === now.getFullYear();
                                                    }).reduce((sum, e) => sum + (e.amount || 0), 0).toLocaleString()}
                                                </p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="stat-card">
                                        <div className="stat-content">
                                            <div>
                                                <p className="stat-label">Total Expenses (All Time)</p>
                                                <p className="stat-value">
                                                    ₦{expenses.reduce((sum, e) => sum + (e.amount || 0), 0).toLocaleString()}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Expenses List */}
                                <div className="card">
                                    <h3 style={{ fontSize: '1.25rem', fontWeight: '700', marginBottom: '1.5rem' }}>
                                        All Expenses ({expenses.length})
                                    </h3>

                                    {expenses.length === 0 ? (
                                        <p style={{ textAlign: 'center', color: '#9ca3af', padding: '3rem' }}>
                                            No expenses recorded yet. Click "Add Expense" to get started.
                                        </p>
                                    ) : (
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                            {expenses
                                                .sort((a, b) => new Date(b.date) - new Date(a.date))
                                                .map(expense => {
                                                    const apartment = expense.apartmentId === 'general' 
                                                        ? { name: 'General' } 
                                                        : apartments.find(a => a.id === expense.apartmentId);
                                                    
                                                    return (
                                                        <div key={expense.id} className="booking-card">
                                                            <div className="booking-card-header">
                                                                <div>
                                                                    <h4 style={{ fontSize: '1.125rem', fontWeight: '600', color: '#1f2937', marginBottom: '0.25rem' }}>
                                                                        {expense.description}
                                                                    </h4>
                                                                    <p style={{ fontSize: '0.875rem', color: '#6b7280' }}>
                                                                        {apartment?.name || 'Unknown'} {expense.apartmentId !== 'general' ? 'Apartment' : ''} • {new Date(expense.date).toLocaleDateString()}
                                                                    </p>
                                                                </div>
                                                                <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}>
                                                                    <span style={{ 
                                                                        padding: '0.5rem 1rem',
                                                                        background: 'linear-gradient(135deg, #2E3192 0%, #F15A29 100%)',
                                                                        color: 'white',
                                                                        borderRadius: '0.5rem',
                                                                        fontWeight: '700',
                                                                        fontSize: '1.125rem'
                                                                    }}>
                                                                        ₦{expense.amount.toLocaleString()}
                                                                    </span>
                                                                    <button
                                                                        onClick={() => handleEditExpense(expense)}
                                                                        className="icon-btn icon-btn-blue"
                                                                        title="Edit"
                                                                    >
                                                                        <Edit />
                                                                    </button>
                                                                    <button
                                                                        onClick={() => handleDeleteExpense(expense.id)}
                                                                        className="icon-btn icon-btn-red"
                                                                        title="Delete"
                                                                    >
                                                                        <Trash />
                                                                    </button>
                                                                </div>
                                                            </div>

                                                            <div className="booking-details-grid">
                                                                <div className="detail-item">
                                                                    <p className="detail-label">Type</p>
                                                                    <p className="detail-value" style={{ textTransform: 'capitalize' }}>
                                                                        {expense.expenseType}
                                                                    </p>
                                                                </div>
                                                                {expense.notes && (
                                                                    <div className="detail-item" style={{ gridColumn: '1 / -1' }}>
                                                                        <p className="detail-label">Notes</p>
                                                                        <p className="detail-value">{expense.notes}</p>
                                                                    </div>
                                                                )}
                                                                <div className="detail-item">
                                                                    <p className="detail-label">Recorded By</p>
                                                                    <p className="detail-value">{expense.createdBy}</p>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<BookingManager />, document.getElementById('root'));
    </script>
</body>
</html>
